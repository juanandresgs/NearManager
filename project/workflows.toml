[[workflow]]
id = "WF-SETTINGS-002"
name = "Edit persist reload and reset runtime settings"
requirements = ["REQ-SETTINGS-001", "REQ-CONFIG-001"]
given = ["Built-in platform user and trusted workspace layers define overlapping settings", "The runtime settings registry is open"]
when = ["Edit values in each category", "Apply a valid candidate", "Attempt an invalid external edit", "Reset the user override", "Restart Near"]
then = ["Typed controls show effective values and provenance", "The valid candidate applies atomically at its declared scope", "The invalid candidate preserves the last valid state with diagnostics", "Reset reveals the next layer", "Persisted values survive restart"]

[[workflow]]
id = "WF-INPUT-002"
