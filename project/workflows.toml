when = ["Open the default embedded shell", "Inspect startup environment and working directory", "Run Vim SSH and a nested alternate-screen program", "Exit under each close policy"]
then = ["Login and interactive startup files load in native order", "PATH locale SSH agent and configured overrides are preserved", "OSC directory resize paste signals and screen restoration work", "Exit and child-process warnings follow the selected profile"]

[[workflow]]
id = "WF-VIEW-CONFIG-001"
name = "Apply global and resource-specific viewer policy"
