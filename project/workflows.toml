[[workflow]]
id = "WF-EDIT-CONFIG-001"
name = "Apply editor behavior and safety policy"
requirements = ["REQ-EDIT-CONFIG-001", "REQ-EDIT-001"]
given = ["Layered editor defaults and writable read-only and externally changed fixtures exist"]
when = ["Open existing and new files", "Edit tabs selections search and line endings", "Change a live and a new-editor setting", "Trigger read-only and external-change handling", "Restart Near"]
then = ["Each editor receives policy at its declared scope", "Display indentation search and save behavior match the effective settings", "Safety prompts and conflict policy remain explicit", "Persisted values and provenance survive restart"]

[[workflow]]
id = "WF-TRASH-002"
name = "Trash ordinary resources without exposing engine conflicts"
requirements = ["REQ-OPS-003", "REQ-TEST-002", "REQ-SEC-001", "REQ-PORT-001", "REQ-PORT-002"]
given = ["Ordinary files directories symlinks duplicate Trash names mounted volume roots and provider roots are available", "A real macOS mounted-volume fixture reproduces the original delete attempt", "The platform Trash adapter and removable-device service report their capabilities"]
when = ["Invoke the normal delete command for each resource class", "Review the visible confirmation", "Confirm ordinary resources", "Attempt the same command on protected roots", "Invoke every conflict command even when it is not rendered", "Inspect refreshed panels Trash metadata journal and operation history"]
then = ["Ordinary resources show a concise Move to Trash confirmation with no replace skip or rename controls", "Trash collisions preserve both resources through platform-correct unique naming", "Mounted filesystem and provider roots are rejected before planning with eject unmount or unsupported guidance", "Protected resources never open an operation preview or enter the operation planner", "Hidden conflict commands cannot alter a Trash decision", "Exact resource identity survives preview execution refresh restore metadata and audit records", "No generic operation policy is presented unless the operator must actually choose it"]

[[workflow]]
id = "WF-QUALIFY-001"
name = "Run autonomous production qualification from a clean checkout"
requirements = ["REQ-REL-002", "REQ-TEST-002", "REQ-FAR-001", "REQ-API-001", "REQ-SEC-001"]
given = ["A clean checkout pinned toolchain supported platform adapters and representative filesystem terminal provider and fault fixtures are available"]
when = ["Run the documented autonomous qualification command without interactive developer repair", "Build release artifacts", "Execute component model render PTY filesystem safety application and Far workflow suites", "Collect the qualification manifest"]
then = ["All mandatory gates pass or the release is blocked", "The manifest identifies the exact revision platform capabilities degradations test and workflow counts performance results and artifact digests", "All reference applications prove the public TUI abstraction", "Failures identify the violated operator contract and retain reproducible evidence"]

[[workflow]]
id = "WF-INPUT-003"
name = "Navigate and select files with cursor and selection independence"
requirements = ["REQ-TEST-002", "REQ-REL-002"]
given = ["A file panel contains more entries than the visible viewport", "Ordinary files and a navigation-only parent entry are available", "The semantic render harness records focused and selected roles"]
when = ["Navigate with arrows Left Right Home End PageUp and PageDown", "Resize the terminal while scrolled", "Select contiguous files with Shift arrows", "Move with plain arrows and select separated files with Insert or Space", "Click visible rows after scrolling"]
then = ["Every navigation command keeps the focused entry visible and clamps at boundaries", "Paging follows the current viewport height", "Plain navigation never changes the selected set", "Non-contiguous selections retain every selected resource", "Focused selected focused unselected and selected non-focused entries have distinct semantic output", "Mouse input targets the visible scrolled slice", "The parent entry never becomes selected"]
