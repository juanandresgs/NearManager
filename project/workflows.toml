when = ["Start and extend Alt filename lookup", "Cycle accept and cancel matches", "Hold and release supported modifier combinations", "Lose focus during a held modifier"]
then = ["Both protocols drive the same lookup state machine", "Escape restores the original cursor", "Enhanced holds show exact binding-derived key bars", "Legacy fallback remains honest and usable", "Focus loss clears stale modifier state"]

[[workflow]]
id = "WF-SHELL-002"
