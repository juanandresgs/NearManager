[[requirement]]
id = "REQ-OPS-003"
title = "Intent-preserving operation workflows"
type = "functional"
priority = "must"
status = "accepted"
statement = "Near MUST present and execute resource mutations according to the operator's domain intent rather than exposing irrelevant generic engine policies, and MUST reject protected platform resources before planning destructive actions."
capabilities = ["CAP-OPERATIONS", "CAP-WORKSPACE", "CAP-PORTABILITY", "CAP-SECURITY"]
milestone = "continuous"
rationale = "A correct generic plan can still produce an unsafe or misleading product workflow when mounted volumes look deletable, Trash exposes replace decisions, or implementation details replace the user's intended action."
acceptance = ["Trash previews use restore-oriented language and expose no replace skip or rename controls", "Name collisions in Trash preserve existing items and allocate a platform-correct unique destination without operator conflict resolution", "Filesystem roots mounted volume roots provider roots and other protected resources are rejected before a destructive plan is recorded", "Device removal is offered through an explicit capability-gated eject or unmount workflow rather than deletion", "Copy move rename archive extraction remote transfer Trash delete wipe and attributes each declare an intent-specific preview and decision contract", "Rendered source and target names preserve exact path identity while remaining readable"]
verification = "test"
planned_evidence = ["crates/near-ops/src/lib.rs", "crates/near-local-fs/src/lib.rs", "crates/near-ui/src/operation_preview.rs", "crates/near-ui/src/workspace.rs", "docs/near-production-autonomy-development-plan.md", "project/workflows.toml"]
design_refs = ["docs/near-operations.md", "docs/near-deletion.md", "docs/near-production-autonomy-development-plan.md", "project/workflows.toml", "project/security/threat-model.toml"]

