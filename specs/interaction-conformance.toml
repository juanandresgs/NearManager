[[case]]
id = "IC-PANEL-009"
suite = "IC-PANEL-NAV"
title = "Enhanced keyboard repeat dispatches the same navigation command as the initial press"
keys = ["Up", "Down", "PageUp", "PageDown", "Home", "End"]
commands = ["near.collection.move", "near.collection.page", "near.collection.first", "near.collection.last"]
precondition = "The terminal reports enhanced press repeat and release event kinds while a panel contains multiple rows"
expected = ["every repeat event resolves the same semantic binding as a press", "holding navigation moves continuously in either pane", "release events remain non-dispatching"]
assertion_layers = ["binding", "command", "model", "render", "boundary"]
test = "panel_navigation_acknowledges_enhanced_key_repeat_on_both_panes"
