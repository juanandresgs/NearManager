[[case]]
id = "IC-COMMAND-001"
suite = "IC-COMMAND-LINE"
title = "Space edits an active command line before panel selection"
keys = ["Space"]
commands = ["near.collection.toggle-selection"]
precondition = "The panel command line already contains text"
expected = ["Space appends to the command buffer", "the focused resource selection remains unchanged", "the rendered command line preserves the space"]
assertion_layers = ["binding", "command", "model", "render", "boundary"]
test = "active_command_line_text_precedes_bindings"
status = "implemented"
operator_required = true

[[case]]
id = "IC-TERMINAL-001"
suite = "IC-TERMINAL-INPUT"
title = "Fragmented legacy escape sequences remain atomic before keymap dispatch"
keys = ["F9", "Alt+Left"]
commands = ["near.menu.main", "near.collection.scroll-horizontal"]
precondition = "A legacy terminal or tmux delivers an escape-prefixed key sequence across multiple reads"
expected = ["the shared reactor emits one normalized key event", "no suffix bytes reach an application command line", "a standalone Escape remains available after a bounded disambiguation delay"]
assertion_layers = ["binding", "command", "model", "render", "boundary"]
test = "terminal_interaction_conformance_fragmented_legacy_sequences_remain_atomic"
status = "implemented"
operator_required = true

[[case]]
