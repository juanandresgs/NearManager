expected = ["plain movement never changes the selected set", "movement clamps at the first and last entries", "the focused entry remains visible"]
assertion_layers = ["binding", "command", "model", "render", "boundary"]
test = "panel_interaction_conformance_plain_arrows_preserve_selection_and_clamp"
