[[behavior]]
id = "ABST-DIST-001"
title = "Verifiable cross-platform binary distribution"
layer = "application-composition"
owner = "tools/package_release.py"
application_policy = "Near release archives compose the supported application binaries with the public README and both project license texts. Platform artifacts use architecture-specific names, exact archive-member checks, extracted-binary help and version smoke tests, SHA-256 sidecars, portable provenance, SPDX SBOMs, and GitHub attestations. Third-party research media without an explicit redistribution license is excluded from the public tree and every release archive."
public_api = []
evidence_model = ["tools/test_release_packaging.py", "tools/validate_release.py"]
evidence_render = ["docs/INSTALL.md", "docs/releases/README.md", "tools/test_release_packaging.py"]
evidence_application = [".github/workflows/release.yml", "docs/releases/v0.2.0.md"]
