[[behavior]]
id = "ABST-SHELL-001"
title = "Versioned shared shell profile and child close lifecycle"
layer = "runtime"
owner = "crates/near-pty/src/lib.rs"
application_policy = "The runtime resolves and captures one immutable shell profile per PTY session, exposes the resolved mode and close policy, owns child termination, and wakes the blocking event reactor when the child exits. Applications present the policy honestly: warn presents terminate, keep-running/hide, and cancel decisions while a child runs and retains completed output; keep-open hides but retains the child; close terminates on request or removes the screen when the shell exits. A running child is never silently discarded, and settings changed after spawn apply only to new sessions."
public_api = ["crates/near-app/src/lib.rs"]
evidence_model = ["crates/near-pty/src/lib.rs", "crates/near-runtime/src/lib.rs"]
evidence_render = ["crates/near-ui/src/terminal_surface.rs"]
evidence_application = ["apps/near-fm/tests/shell_close_policy.rs", "tools/test_tmux_terminal_workflows.py"]
public_consumer = "required"
consumer_evidence = ["crates/near-app/src/lib.rs", "apps/near-demo/src/main.rs"]
status = "implemented"
