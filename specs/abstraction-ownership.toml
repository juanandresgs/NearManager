consumer_evidence = []
status = "implemented"

[[behavior]]
id = "ABST-KEYMAP-001"
title = "Contextual semantic keymap and binding-derived discoverability"
layer = "runtime"
owner = "crates/near-ui/src/keymap.rs"
application_policy = "Applications choose default bindings, contexts, and which workflow commands occupy a contextual keybar while the runtime owns parsing, text-input capture eligibility, resolution precedence, sequences, descriptions, binding-derived labels, and repeat dispatch. Active text inputs receive character presses and repeats without Control, Alt, or Super before contextual command bindings; release events remain available to routing and keymaps. Single-stroke navigation keys repeat by default, bindings may explicitly opt in or out, release events never dispatch, and repeats never alter a pending chord."
public_api = ["crates/near-app/src/lib.rs"]
evidence_model = ["crates/near-terminal/src/input.rs", "crates/near-ui/src/keymap.rs", "crates/near-ui/tests/keymap.rs"]
evidence_render = ["crates/near-ui/src/workspace.rs", "crates/near-ui/tests/keymap.rs"]
