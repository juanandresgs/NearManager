[[behavior]]
id = "ABST-OPERATION-001"
title = "Provider-neutral operation intent presentation"
layer = "core-contract"
owner = "crates/near-ops/src/lib.rs"
application_policy = "Applications request operations and render declared decisions without inferring reversibility denial or conflict choices from operation kinds. Backends report execution effects and exact per-item failures, including a platform-selected destination, so summaries and journals retain exact restoration targets rather than guessed plan paths. Applications must present failed completion visibly with the affected resource and error instead of relying on transient status text. Provider-neutral Restore intents return recorded Trash resources to their exact original destinations through immutable plans and ordinary collision decisions; Near FM owns only the last-completed-Trash affordance and retention of failed restoration entries."
public_api = ["crates/near-app/src/lib.rs"]
evidence_model = ["crates/near-ops/src/lib.rs"]
evidence_render = ["crates/near-ui/src/operation_preview.rs"]
evidence_application = ["crates/near-ui/src/workspace.rs"]
public_consumer = "required"
consumer_evidence = ["crates/near-app/src/lib.rs", "project/evidence/tui-abstraction-harvest.md", "tools/validate_tui_proof.py"]
status = "implemented"

[[behavior]]
id = "ABST-TERMINAL-001"
title = "Normalized terminal lifecycle with invalidation-driven rendering"
layer = "terminal-adapter"
owner = "crates/near-terminal/src/reactor.rs"
application_policy = "Applications and operator probes consume normalized input through the shared reactor, which blocks for terminal readiness, PTY output wakes, task wakes, signals, disconnection, or exact deadlines; rendering occurs only after invalidation. Normalized key strokes own backend-independent PTY byte encoding for native line editors. PTY snapshots preserve indexed and RGB colors, core text attributes, combining content, and wide-cell geometry; reusable terminal surfaces project those cells through backend-independent styled scene primitives rather than flattening output to theme text. The PTY adapter exposes foreground-process labels on platforms whose native TTY process inventory supports them, falling back to the resolved shell program without polling during ordinary rendering. The reusable terminal surface may project the same persistent PTY as a dock or full user screen; applications choose panel composition and reserved shortcuts but must not substitute a second prompt, history, completion, or line editor. In Near FM panel composition, an unbound Alt letter owns filename lookup before a nonempty shell draft can consume it; bound chords and active full-screen terminal applications retain their declared ownership. The Unix adapter coalesces escape-prefixed legacy input fragmented by a host terminal or tmux before any application surface can observe a partial sequence. Legacy encoding cannot preserve Shift identity on control letters, so advertised mandatory commands require a representable fallback rather than relying on synthetic enhanced-key tests. Legacy tmux sessions declare the bounded escape-time profile required for prompt standalone Escape instead of silently presenting ambiguous back navigation. No interactive binary may retain an independent timeout-poll loop that can spin after PTY hangup. Near FM reserves Ctrl+Alt+Q as a keymap-independent emergency quit that bypasses surface routing but still returns through terminal restoration."
public_api = ["crates/near-pty/src/lib.rs", "crates/near-terminal/src/lib.rs", "crates/near-ui/src/scene.rs", "crates/near-app/src/lib.rs"]
evidence_model = ["crates/near-pty/src/lib.rs", "crates/near-terminal/src/input.rs", "crates/near-terminal/src/session.rs", "crates/near-terminal/src/reactor.rs", "crates/near-runtime/src/lib.rs", "crates/near-ui/src/render_loop.rs"]
evidence_render = ["crates/near-ui/src/terminal_surface.rs", "crates/near-ui/src/workspace_terminal.rs"]
evidence_application = ["crates/near-ui/src/workspace.rs", "crates/near-ui/src/workspace_terminal.rs", "crates/near-ui/src/application.rs", "apps/near-input-probe", "tools/test_idle_cpu.py", "tools/test_tmux_terminal_workflows.py"]
public_consumer = "required"
consumer_evidence = ["crates/near-app/src/lib.rs", "apps/near-demo/src/main.rs", "apps/near-input-probe/Cargo.toml", "project/evidence/tui-abstraction-harvest.md", "tools/validate_tui_proof.py"]
status = "implemented"

