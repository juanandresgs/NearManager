[[behavior]]
id = "ABST-FAR-001"
title = "Far-compatible file-manager workspace composition"
layer = "application-policy"
owner = "crates/near-ui/src/workspace.rs"
application_policy = "Owns Far key policy, active and passive panel composition, file-manager workflows, and compatibility decisions; reusable mechanics must be delegated to lower layers. Alt-letter starts filename lookup, additional Alt-letters while the modifier remains held extend the same query, and repeating the initial one-character chord cycles matches. Once panel command-line text is active, unmodified characters including Space edit that buffer before global panel bindings, while an initial Space with an empty buffer retains Far selection behavior."
public_api = []
evidence_model = ["crates/near-ui/src/workspace.rs"]
evidence_render = ["crates/near-ui/src/workspace.rs"]
evidence_application = ["apps/near-fm", "tools/test_tmux_terminal_workflows.py"]
