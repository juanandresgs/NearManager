consumer_evidence = []
status = "implemented"

[[behavior]]
id = "ABST-LIST-001"
title = "Filtered list navigation and Far-compatible resource-kind presentation"
layer = "reusable-surface"
owner = "crates/near-ui/src/list_navigation.rs"
application_policy = "Applications choose commands columns themes and active lookup query while shared collection matching prefers case-insensitive filename prefixes and falls back to case-insensitive internal spans only when the prefix tier is empty. Shared collection rendering keeps names unadorned, exposes directory identity through semantic roles plus Folder and Up size labels, presents local file locations as decoded native paths, and overlays only the original matched filename cells with dedicated passive and focused lookup roles. Shared navigation owns filtered movement boundaries paging viewport following and pointer-row mapping. Near FM composes lookup as a transient status-and-keybar mode, labels the contains fallback explicitly, and closes zero-or-one-result lookup movement without leaving stale status text."
public_api = ["crates/near-app/src/lib.rs"]
evidence_model = ["crates/near-ui/src/list_navigation.rs", "crates/near-ui/src/collection.rs"]
evidence_render = ["crates/near-ui/src/menu.rs", "crates/near-ui/src/settings_surface.rs", "crates/near-ui/src/task.rs", "crates/near-ui/src/command_history.rs", "crates/near-ui/src/folder_history.rs", "crates/near-ui/src/resource_history.rs"]
evidence_application = ["crates/near-ui/src/workspace.rs", "tools/test_tmux_terminal_workflows.py"]
public_consumer = "required"
consumer_evidence = ["crates/near-app/src/lib.rs", "project/evidence/tui-abstraction-harvest.md", "tools/validate_tui_proof.py"]
status = "implemented"

[[behavior]]
id = "ABST-SCREEN-001"
title = "Stable tabs with zoomable pane presentation"
layer = "reusable-surface"
owner = "crates/near-ui/src/tab_registry.rs"
application_policy = "Shared tab mechanics own stable identity, active selection, cycling, closing, and title state independently of terminal or file-manager assumptions. Shared pane presentation owns base, first/second pane, and reversible full-screen zoom state. Near FM composes persistent PTY sessions into these primitives, keeps the ordinary Far dual-panel layout as the default, uses Ctrl+O as zoom/restore, and exposes tab creation, cycling, pane placement, hiding, and close-policy commands. The F12 switcher numbers its first nine retained screens for direct activation and combines terminal tab identity with foreground-process and lifecycle state. Near FM advertises legacy-representable Ctrl+Alt bindings for terminal workspace commands and treats Ctrl+Shift forms as enhanced-keyboard aliases because legacy control-letter encoding collapses Shift identity. A terminal session has one active input and viewport projection even when its retained tab is hidden."
public_api = ["crates/near-ui/src/tab_registry.rs", "crates/near-app/src/lib.rs"]
evidence_model = ["crates/near-ui/src/tab_registry.rs"]
evidence_render = ["crates/near-ui/src/workspace_terminal.rs"]
evidence_application = ["crates/near-ui/src/workspace.rs", "tools/test_tmux_terminal_workflows.py"]
public_consumer = "required"
consumer_evidence = ["crates/near-app/src/lib.rs", "apps/near-demo/src/main.rs"]
status = "implemented"

