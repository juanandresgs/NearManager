schema_version = 1

[policy]
allowed_layers = ["core-contract", "terminal-adapter", "runtime", "reusable-surface", "application-composition", "application-policy", "platform-adapter"]
reusable_layers = ["core-contract", "terminal-adapter", "runtime", "reusable-surface", "platform-adapter"]
required_evidence = ["model", "render", "application"]
public_consumer_values = ["required", "not-required", "pending"]
exception_statuses = ["active", "expired", "closed"]

[[behavior]]
id = "ABST-APPLICATION-001"
title = "Backend-neutral surface application facade"
layer = "runtime"
owner = "crates/near-ui/src/application.rs"
application_policy = "Applications provide semantic surfaces, commands, keymaps, and themes without selecting Ratatui or Crossterm backends. Contextual help presents bindings declared by the active surface before inherited bindings so domain commands remain discoverable as the global command set grows."
public_api = ["crates/near-app/src/lib.rs"]
evidence_model = ["crates/near-ui/src/application.rs"]
evidence_render = ["crates/near-app/src/lib.rs", "crates/near-ui/src/application.rs"]
evidence_application = ["apps/near-view", "apps/near-proc", "crates/near-testkit/src/lib.rs"]
public_consumer = "required"
consumer_evidence = ["apps/near-view/Cargo.toml", "apps/near-proc/Cargo.toml", "crates/near-testkit/Cargo.toml", "project/evidence/tui-abstraction-harvest.md", "tools/validate_tui_proof.py"]
status = "verified"

