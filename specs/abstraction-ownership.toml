[[behavior]]
id = "ABST-FAR-002"
title = "Far-compatible mutable Temporary Panel lifecycle"
layer = "application-policy"
owner = "crates/near-ui/src/workspace.rs"
application_policy = "Near FM owns the ten-slot Far workflow, Alt+F1 and Alt+F2 side-targeted location contribution, numbered persisted previews, restart persistence, copy-as-reference policy, contextual F7 removal, explicit one/all-slot clearing, reveal command, UTF-8 list interchange, asynchronous tmp command capture, labeled list menus, full-panel mode, safe-mode denial, arbitrary command-text rows, stale-reference retention, refresh availability, task-history presentation, and bindings. F5 into a Temporary Panel only adds durable references and never moves renames or deletes source resources. Safe mode denies every reference mutation path, including direct add/remove/clear, list import, replace mode, and command-output capture. Providers own parsing of native reference text while shared collection selection, provider-neutral ResourceRef identity, state-document persistence, tasks, menus, dialogs, dual-surface composition, and keymap resolution remain reusable lower-layer contracts."
public_api = []
evidence_model = ["crates/near-ui/src/workspace.rs", "crates/near-local-fs/src/lib.rs"]
evidence_render = ["crates/near-ui/src/workspace.rs", "specs/keymap.toml"]
evidence_application = ["docs/near-temporary-panels.md", "specs/operator-workflows.toml", "tools/test_tmux_terminal_workflows.py"]
public_consumer = "not-required"
consumer_evidence = []
status = "partial"

