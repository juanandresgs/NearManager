owner = "crates/near-ui/src/menu.rs"
application_policy = "Reusable menus expose their declared title and items for diagnostics and conformance; applications own popup placement, exact pointer hit boundaries, resource-, provider-, policy-, and adapter-specific availability, and must never present an enabled inert action. Every rendered item row, including the final row above the border, must remain pointer-activatable. Switching top-level headers replaces the current category without adding overlay back-history."
