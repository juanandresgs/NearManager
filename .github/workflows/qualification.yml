name: Qualification

on:
  workflow_dispatch:
    inputs:
      profile:
        description: Qualification profile
        required: true
        default: wave
        type: choice
        options: [developer, wave, production]

jobs:
  release-candidate:
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          components: rustfmt, clippy
      - run: python3 tools/qualify.py "${{ inputs.profile }}" --no-resume
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: release-qualification-${{ matrix.os }}
          path: .near/qualification
